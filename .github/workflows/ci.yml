name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  verify:
    name: vet + test + build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: go vet
        run: cd go && go vet ./...

      - name: go test
        run: cd go && go test ./... -v

      - name: go build
        run: cd go && go build -o /tmp/ssh-skill ./cmd/ssh-skill/
